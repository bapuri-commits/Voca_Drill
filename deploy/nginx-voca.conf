server {
    listen 443 ssl http2;
    server_name voca.syworkspace.cloud;

    ssl_certificate /etc/letsencrypt/live/syworkspace.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/syworkspace.cloud/privkey.pem;

    include /etc/nginx/snippets/security-headers.conf;

    # PDF uploads (increase limit for large PDFs)
    client_max_body_size 100M;

    # SyOps 로그인 API 프록시 (CORS 우회)
    location /syops-auth/ {
        proxy_pass https://syworkspace.cloud/api/auth/;
        proxy_set_header Host syworkspace.cloud;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
    }

    location / {
        proxy_pass http://127.0.0.1:8500;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name voca.syworkspace.cloud;
    return 301 https://$host$request_uri;
}

db:
  path: "voca_drill.db"

session:
  default_size: 15
  min_size: 10
  max_size: 20
  review_ratio: 0.7
  daily_new_limit: 15

scheduler:
  algorithm: "sm2"
  initial_ease_factor: 2.5
  min_ease_factor: 1.3

mastery_levels:
  learning_max_days: 3
  review_max_days: 7
  familiar_max_days: 30

llm:
  provider: "anthropic"
  model: "claude-sonnet-4-20250514"
